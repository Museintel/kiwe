<section id="hero" class="seam-section seam-stack biovantage-hero" data-role="section" data-seam-purpose="hero">
  <p class="seam-eyebrow">Wellness catalog</p>
  <h1>{site_title}</h1>
  <p class="seam-lead">Evidence-led supplements and wellness support.</p>
  <a class="seam-button" href="/shop">Shop products</a>
  <button class="seam-button" data-dsa-open-module="search" type="button">Search Kiwe</button>
</section>

<section id="featured-products" class="seam-section seam-reel" data-role="section" data-kiwe-query-template="featured-products">
  <h2>Featured products</h2>
  <article class="seam-card product-card" data-role="card" data-kiwe-binding="featured-products">
    <img src="{featured_image}" alt="" />
    <h3>{post_title}</h3>
    <p>{post_excerpt}</p>
    <a href="{post_url}">View product</a>
  </article>
</section>
