<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kiwe binding fixture</title>
</head>
<body>
  <main>
    <section id="fudge" class="seam-section nc-product-rail" data-role="section" data-kiwe-binding="fudge-products" aria-labelledby="fudge-title">
      <h2 id="fudge-title">Fudge favourites</h2>
      <article class="seam-card nc-product-card">
        <img src="placeholder.jpg" alt="">
        <h3>Chocolate walnut fudge</h3>
        <p>Preview-only product card. Bricks replaces this card with a product query loop.</p>
      </article>
    </section>
    <button type="button" data-dsa-open-module="cart" aria-label="Open Kiwe cart">Cart</button>
  </main>
</body>
</html>
