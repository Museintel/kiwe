name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  source-contracts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Confirm PHP platform
        run: php -r "exit(PHP_VERSION_ID >= 80200 && PHP_VERSION_ID < 80500 ? 0 : 1);"
      - name: Verify release package
        run: node tools/release/verify-package.cjs
      - name: Run Seam and runtime UI audits
        run: |
          node tools/ui-theme/audit-seam-adoption.cjs
          node tools/ui-theme/audit-runtime-token-purity.cjs
          node tools/ui-theme/validate-package.cjs tools/ui-theme/fixtures/valid
          if node tools/ui-theme/validate-package.cjs tools/ui-theme/fixtures/invalid-runtime-bridge-token; then
            echo "invalid-runtime-bridge-token fixture unexpectedly passed"
            exit 1
          fi
          node kiwe-ai-toolkit/tools/validate-framework-profile.cjs kiwe-ai-toolkit/fixtures/framework-profile-valid
      - name: Run release contracts
        run: |
          node tools/security/rc4-contracts.cjs
          node tools/cache/rc5-contracts.cjs
          node tools/runtime/rc6-contracts.cjs
          node tools/pwa/rc7-contracts.cjs
          node tools/runtime/rc8-contracts.cjs
          node tools/compatibility/rc10-contracts.cjs
          node tools/wp7/rc11-contracts.cjs
          node tools/release/rc12-contracts.cjs
          node tools/certification/rc13-search-contracts.cjs
      - name: Check JavaScript syntax
        shell: bash
        run: |
          find wp-content/mu-plugins/dsa/assets/js -type f -name '*.js' -print0 | while IFS= read -r -d '' file; do node --input-type=module --check < "$file"; done
          find tools -type f -name '*.cjs' -print0 | while IFS= read -r -d '' file; do node --check "$file"; done

  ui-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install UI harness
        working-directory: tools/ui-contract
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Run responsive accessibility and geometry contract
        run: node tools/ui-contract/run.cjs
